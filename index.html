<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Library</h1>
            <button id="new-book-btn" command="show-modal" commandfor="new-book-dialog">New Book</button>
            <dialog id="new-book-dialog">
                <button id="close-btn" commandfor="new-book-dialog" command="close">×</button>
                <h2>Add New Book to Library</h2>
                <hr>
                <form id="new-book-form" action="">
                    <div class="form-row">
                        <label for="title">Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-row">
                        <label for="author">Author</label>
                        <input type="text" id="author" required>
                    </div>
                    <div class="form-row">
                        <label for="pages">Number of Pages</label>
                        <input type="number" id="pages" required>
                    </div>
                    <div class="form-row">
                        <label for="read">Reading Status</label>
                        <select name="read" id="read" required>
                            <option value="" disabled selected>Choose an option</option>
                            <option value="Unread">Unread</option>
                            <option value="Reading">Reading</option>
                            <option value="Read">Read</option>
                        </select>
                    </div>
                    <hr>
                    <button id="add-book-btn" type="submit">Add Book</button>
                </form>
            </dialog>
        </header>
        <div class="books-container">
            <div class="books-list-header">
                <h3>Title</h3>
                <h3>Author</h3>
                <h3>Number of Pages</h3>
                <h3>Reading Status</h3>
            </div>
            <div id="books-list"></div>
        </div>
    </div>
</body>
</html>
